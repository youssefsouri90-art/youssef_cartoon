name: Build Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # هذه الخطوة ستقوم بإنشاء ملف التشغيل إذا كان مفقوداً
      - name: Initialize Gradle Wrapper
        run: gradle wrapper

      # إعطاء صلاحية التنفيذ للملف
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Carateen Extension
        # تشغيل البناء باستخدام الملف الذي أنشأناه
        run: ./gradlew :CarateenProvider:assembleDebug
