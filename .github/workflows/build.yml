name: Build Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :CarateenProvider:make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CarateenPlugin
          path: CarateenProvider/build/outputs/aar/*.cs3
