name: Build Cloudstream Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          # تعطيل الكاش لضمان عدم استخدام ملفات تسببت في خطأ 401 سابقاً
          cache-disabled: true

      - name: Build Plugin with Gradle
        run: |
          # تنظيف أي بقايا بناء سابق وإجبار النظام على جلب الملحقات من جديد
          gradle clean :CarateenProvider:make --refresh-dependencies --no-build-cache --stacktrace

      - name: Upload Built Plugin (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: CarateenPlugin-CS3
          path: CarateenProvider/build/outputs/aar/*.cs3

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: CarateenProvider/build/outputs/aar/*.cs3
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
