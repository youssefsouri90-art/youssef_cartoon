name: Build Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5 # سيقوم هذا السطر بتحميل Gradle تلقائياً

      - name: Build with Gradle
        run: |
          # سنستخدم 'gradle' مباشرة بدلاً من './gradlew' لتجنب مشاكل الملفات المفقودة
          gradle :CarateenProvider:make
